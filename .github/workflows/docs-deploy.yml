name: Docs Deploy

on:
    push:
        branches: [main]
        paths:
            - "packages/docs/**"
            - "packages/components/**"
            - ".github/workflows/docs-deploy.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build-docs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - name: Install and build docs
              working-directory: packages
              run: bun install --frozen-lockfile && bun run --filter @moondust/docs build
            - uses: actions/upload-artifact@v4
              with:
                  name: docs-site
                  path: packages/docs/build

    build-storybook:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - name: Install and build Storybook
              working-directory: packages
              run: bun install --frozen-lockfile && bun run --filter @moondust/components build
            - uses: actions/upload-artifact@v4
              with:
                  name: storybook-dist
                  path: packages/components/dist

    merge:
        runs-on: ubuntu-latest
        needs: [build-docs, build-storybook]
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: docs-site
                  path: _site
            - uses: actions/download-artifact@v4
              with:
                  name: storybook-dist
                  path: _site/storybook
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: _site

    deploy:
        needs: merge
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/deploy-pages@v4
              id: deployment
