# Archives match packages/cli naming: moondust_<semver>_<os>_<arch>.tar.gz | .zip
name: Release

on:
    push:
        tags: ["v*"]

permissions:
    contents: write

jobs:
    linux-amd64:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.25.1"
            - uses: oven-sh/setup-bun@v2
            - name: Sash CLI
              run: go install github.com/zackarysantana/sash/cmd/sash@latest
            - name: Build
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  export PATH="$(go env GOPATH)/bin:$PATH"
                  export GOFLAGS="-ldflags=-X moondust/internal/v2/buildinfo.DisplayLabel=$RELEASE_TAG"
                  sash build
            - name: Pack
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  tar -czvf "moondust_${VERSION}_linux_amd64.tar.gz" -C bin moondust
            - uses: actions/upload-artifact@v4
              with:
                  name: asset-linux-amd64
                  path: moondust_*_linux_amd64.tar.gz

    linux-arm64:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.25.1"
            - uses: oven-sh/setup-bun@v2
            - name: Sash CLI
              run: go install github.com/zackarysantana/sash/cmd/sash@latest
            - name: Build
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  export PATH="$(go env GOPATH)/bin:$PATH"
                  export GOFLAGS="-ldflags=-X moondust/internal/v2/buildinfo.DisplayLabel=$RELEASE_TAG"
                  sash build
            - name: Pack
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  tar -czvf "moondust_${VERSION}_linux_arm64.tar.gz" -C bin moondust
            - uses: actions/upload-artifact@v4
              with:
                  name: asset-linux-arm64
                  path: moondust_*_linux_arm64.tar.gz

    windows-amd64:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.25.1"
            - uses: oven-sh/setup-bun@v2
            - name: Sash CLI
              run: go install github.com/zackarysantana/sash/cmd/sash@latest
            - name: Build
              shell: pwsh
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  $env:PATH += ";" + (go env GOPATH) + "\bin"
                  $env:GOFLAGS = "-ldflags=-X moondust/internal/v2/buildinfo.DisplayLabel=$env:RELEASE_TAG"
                  sash build
            - name: Pack
              shell: pwsh
              run: |
                  $v = "${{ github.ref_name }}".TrimStart("v")
                  if ((Test-Path "bin/moondust") -and !(Test-Path "bin/moondust.exe")) {
                    Rename-Item "bin/moondust" "moondust.exe"
                  }
                  Compress-Archive -Path "bin\moondust.exe" -DestinationPath "moondust_${v}_windows_amd64.zip"
            - uses: actions/upload-artifact@v4
              with:
                  name: asset-windows-amd64
                  path: moondust_*_windows_amd64.zip

    windows-arm64:
        runs-on: windows-11-arm
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.25.1"
            - uses: oven-sh/setup-bun@v2
            - name: Sash CLI
              run: go install github.com/zackarysantana/sash/cmd/sash@latest
            - name: Build
              shell: pwsh
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  $env:PATH += ";" + (go env GOPATH) + "\bin"
                  $env:GOFLAGS = "-ldflags=-X moondust/internal/v2/buildinfo.DisplayLabel=$env:RELEASE_TAG"
                  sash build
            - name: Pack
              shell: pwsh
              run: |
                  $v = "${{ github.ref_name }}".TrimStart("v")
                  if ((Test-Path "bin/moondust") -and !(Test-Path "bin/moondust.exe")) {
                    Rename-Item "bin/moondust" "moondust.exe"
                  }
                  Compress-Archive -Path "bin\moondust.exe" -DestinationPath "moondust_${v}_windows_arm64.zip"
            - uses: actions/upload-artifact@v4
              with:
                  name: asset-windows-arm64
                  path: moondust_*_windows_arm64.zip

    darwin-arm64:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.25.1"
            - uses: oven-sh/setup-bun@v2
            - name: Sash CLI
              run: go install github.com/zackarysantana/sash/cmd/sash@latest
            - name: Build
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  export PATH="$(go env GOPATH)/bin:$PATH"
                  export GOFLAGS="-ldflags=-X moondust/internal/v2/buildinfo.DisplayLabel=$RELEASE_TAG"
                  sash build
            - name: Pack
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  tar -czvf "moondust_${VERSION}_darwin_arm64.tar.gz" -C bin moondust
            - uses: actions/upload-artifact@v4
              with:
                  name: asset-darwin-arm64
                  path: moondust_*_darwin_arm64.tar.gz

    publish:
        needs:
            - linux-amd64
            - linux-arm64
            - windows-amd64
            - windows-arm64
            - darwin-arm64
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true
            - uses: softprops/action-gh-release@v2
              with:
                  files: dist/*
